name: Atualiza Painel Financeiro
on:
  schedule:
    - cron: '0 12,22 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Atualiza panel-data.json
        env:
          WINDSOR_API_KEY: ${{ secrets.WINDSOR_API_KEY }}
        run: node scripts/update-panel.mjs
      - name: Commit se mudou
        run: |
          git config user.name "zenivita-bot"
          git config user.email "bot@zenivita.online"
          git add panel-data.json
          git diff --staged --quiet || git commit -m "chore: atualiza painel financeiro [skip ci]"
          git push
